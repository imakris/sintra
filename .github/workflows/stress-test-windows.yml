name: Stress Test - Windows (reusable)

on:
  workflow_call:
    inputs:
      build_run_id:
        description: "Actions run id of the build that produced artifacts"
        required: true
        type: string
      head_sha:
        description: "Commit SHA to test (head of PR or push)"
        required: true
        type: string
      base_sha:
        description: "Base commit SHA for diff detection (PR base or push commit)"
        required: false
        type: string
      branch:
        description: "Branch name (PR head ref or push ref)"
        required: false
        type: string
      pr_number:
        description: "PR number if this came from a PR"
        required: false
        type: string
      force_tests:
        description: "Run tests even when path filters do not match"
        required: false
        type: boolean
        default: false
    secrets:
      repository-token:
        description: "GitHub token forwarded from the caller workflow"
        required: true
      gist-secret:
        description: "Gist token for badge updates"
        required: false

permissions:
  actions: read
  contents: read
  statuses: write

concurrency:
  group: stress-${{ inputs.head_sha }}-windows
  cancel-in-progress: false

jobs:
  stress-test:
    name: Stress Test
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.repository-token }}

    steps:
      - name: Set context env
        shell: bash
        run: |
          echo "RUN_ID=${{ inputs.build_run_id }}" >> "$GITHUB_ENV"
          echo "HEAD_SHA=${{ inputs.head_sha }}" >> "$GITHUB_ENV"
          echo "BASE_SHA=${{ inputs.base_sha || '' }}" >> "$GITHUB_ENV"
          echo "HEAD_BRANCH=${{ inputs.branch || '' }}" >> "$GITHUB_ENV"
          echo "PR_NUMBER=${{ inputs.pr_number || '' }}" >> "$GITHUB_ENV"

      - name: Context
        if: always()
        shell: bash
        run: |
          {
            echo "### Source";
            if [ -n "${PR_NUMBER}" ]; then
              echo "- PR: #${PR_NUMBER}";
            else
              echo "- PR: —";
            fi
            if [ -n "${HEAD_BRANCH}" ]; then
              echo "- Branch: ${HEAD_BRANCH}";
            else
              echo "- Branch: —";
            fi
            echo "- Commit: ${HEAD_SHA}";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.HEAD_SHA }}
          fetch-depth: 0

      - name: Determine diff base
        id: diff-base
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${BASE_SHA}" ]; then
            base_commit="$BASE_SHA"
          else
            read -ra parents <<< "$(git rev-list --parents -n 1 "${HEAD_SHA}")"
            if [ "${#parents[@]}" -ge 3 ]; then
              parent1="${parents[1]}"
              parent2="${parents[2]}"
              if git diff --quiet "$parent1" "${HEAD_SHA}"; then
                base_commit="$parent2"
              else
                base_commit="$parent1"
              fi
            elif git rev-parse "${HEAD_SHA}^" >/dev/null 2>&1; then
              base_commit="$(git rev-parse "${HEAD_SHA}^")"
            else
              base_commit="$HEAD_SHA"
            fi
          fi
          echo "base=$base_commit" >> "$GITHUB_OUTPUT"

      - name: Detect changed areas
        id: changed
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          base: ${{ steps.diff-base.outputs.base }}
          filters: |
            core:
              - 'src/**'
              - 'include/**'
              - 'cmake/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - 'third_party/**'
            tests:
              - 'tests/**'
            examples:
              - 'example/**'
            workflows:
              - '.github/workflows/**'

      - name: Ensure Windows debugging tools
        shell: pwsh
        run: |
          function Get-DebugDirectories {
            return @(
              "${env:ProgramFiles(x86)}\Windows Kits\10\Debuggers\x64",
              "${env:ProgramFiles(x86)}\Windows Kits\10\Debuggers\x86"
            ) | Where-Object { $_ -and (Test-Path $_) }
          }

          $debugDirs = Get-DebugDirectories
          if (-not $debugDirs) {
            $packages = @(
              'windows-sdk-10-version-10.0.26100.1742',
              'windows-sdk-10-version-10.0.26100.1',
              'windows-sdk-10-version-10.0.22621.755'
            )

            $installed = $false
            foreach ($package in $packages) {
              Write-Host "Attempting to install $package via Chocolatey"
              choco install $package --no-progress -y --package-parameters "'ADDLOCAL=DebuggingTools'"
              if ($LASTEXITCODE -in 0, 3010, 1641) {
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "Chocolatey reported reboot-required exit code $LASTEXITCODE for $package; treating as success"
                  $global:LASTEXITCODE = 0
                }
                $installed = $true
                break
              }
              Write-Warning "Failed to install $package (exit code $LASTEXITCODE)."
              $global:LASTEXITCODE = 0
            }

            if (-not $installed) {
              Write-Warning "Windows debugging tools could not be installed. Packages tried: $($packages -join ', ')"
            }

            $debugDirs = Get-DebugDirectories
          }

          if (-not $debugDirs) {
            Write-Warning 'Windows debugging tools not found. Crash dump collection will be skipped during stress tests.'
          } else {
            foreach ($dir in $debugDirs) {
              Add-Content -Path $env:GITHUB_PATH -Value $dir
            }
          }

      - name: Verify Windows debuggers
        shell: pwsh
        run: |
          $candidates = @('cdb', 'ntsd', 'windbg')
          $found = @()
          foreach ($candidate in $candidates) {
            $command = Get-Command $candidate -ErrorAction SilentlyContinue
            if ($command) {
              $paths = @($command | ForEach-Object {
                  if ($_.Source) { $_.Source } else { $_.Definition }
                }) | Where-Object { $_ }
              if (-not $paths) {
                $paths = @('<unknown path>')
              }
              Write-Host "$candidate -> $($paths -join ', ')"
              $found += $candidate
            } else {
              Write-Warning "Unable to locate $candidate"
            }
            $global:LASTEXITCODE = 0
          }
          if (-not $found) {
            Write-Warning "No Windows debugger discovered. Checked: $($candidates -join ', ')"
            Add-Content -Path $env:GITHUB_ENV -Value 'SINTRA_WINDOWS_DEBUGGER_AVAILABLE=false'
          } else {
            Add-Content -Path $env:GITHUB_ENV -Value 'SINTRA_WINDOWS_DEBUGGER_AVAILABLE=true'
          }

      - name: Download build artifacts
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e # v4.1.7
        with:
          name: windows-build-${{ env.HEAD_SHA }}
          path: build/
          github-token: ${{ secrets.repository-token }}
          run-id: ${{ env.RUN_ID }}
      - name: Verify artifacts present
        shell: bash
        run: |
          if [ ! -d build ]; then
            echo "Expected build artifacts were not downloaded" >&2
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Run stress tests with run_tests.py
        if: inputs.force_tests || steps.changed.outputs.tests == 'true' || steps.changed.outputs.core == 'true' || steps.changed.outputs.workflows == 'true'
        shell: bash
        env:
          SINTRA_PRESERVE_SCRATCH: "1"
        run: |
          cd tests
          python run_tests.py --timeout 30 --build-dir ../build --config Debug,Release --time-budget 7200

      - name: List preserved scratch (failure only)
        if: failure()
        shell: pwsh
        run: |
          Write-Host "Searching for preserved scratch under build/"
          if (Test-Path build) {
            Get-ChildItem -Force -Path build -Filter ".sintra-test-scratch*" | ForEach-Object {
              Write-Host "scratch root: $($_.FullName)"
            }
            Get-ChildItem -Force -Recurse -Path build -Filter "trace.log" | Where-Object {
              $_.FullName -like "*sintra-test-scratch*"
            } | ForEach-Object {
              Write-Host "trace file: $($_.FullName)"
            }
          } else {
            Write-Warning "build directory not found"
          }

      - name: Upload preserved scratch artifacts (failure only)
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-scratch-${{ github.run_id }}
          path: |
            build/.sintra-test-scratch-*/**
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

      - name: Mark status success
        if: success()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const {owner, repo} = context.repo;
            const sha = process.env.HEAD_SHA;
            const branch = process.env.HEAD_BRANCH;
            const prNumber = process.env.PR_NUMBER;
            const statusContext = 'Stress Test (Windows)';
            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state: 'success',
              context: statusContext,
              target_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              description: `Stress Test passed${branch ? ` on ${branch}` : ''}${prNumber ? ` (PR #${prNumber})` : ''}`
            });

      - name: Mark status failure
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const {owner, repo} = context.repo;
            const sha = process.env.HEAD_SHA;
            const branch = process.env.HEAD_BRANCH;
            const prNumber = process.env.PR_NUMBER;
            const statusContext = 'Stress Test (Windows)';
            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state: 'failure',
              context: statusContext,
              target_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              description: `Stress Test failed${branch ? ` on ${branch}` : ''}${prNumber ? ` (PR #${prNumber})` : ''}`
            });

      - name: Update tests badge
        if: always() && inputs.branch == 'master' && inputs.pr_number == ''
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.gist-secret }}
          gistID: 38c12e638eddbbfad6962730f6b10d20
          filename: sintra-windows-tests.json
          label: Tests
          message: ${{ job.status }}
          color: ${{ job.status == 'success' && 'green' || 'red' }}
