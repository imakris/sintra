name: Build & Test - Windows

on:
  workflow_dispatch:
  push:
    branches: [ '*' ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'third_party/**'
      - 'tests/**'
      - 'example/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ '*' ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'third_party/**'
      - 'tests/**'
      - 'example/**'
      - '.github/workflows/**'

jobs:
  build:
    name: Windows Build
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Set up MSVC environment
        uses: TheMrMilchmann/setup-msvc-dev@79dac248aac9d0059f86eae9d8b5bfab4e95e97c # v4.0.0
        with:
          arch: x64

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@1583d6b38d7be47f593cb472781bbb21cab4321e # v0.0.10
        with:
          version: v0.16.0

      - name: Detect changed areas
        id: changed
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            core:
              - 'src/**'
              - 'include/**'
              - 'cmake/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - 'third_party/**'
            tests:
              - 'tests/**'
            examples:
              - 'example/**'
            workflows:
              - '.github/workflows/**'

      - name: Compute CMake flags
        id: flags
        shell: bash
        run: |
          CT="-DSINTRA_BUILD_TESTS=ON"
          CE="-DSINTRA_BUILD_EXAMPLES=OFF"
          CS="-DSINTRA_RELEASE_WITH_DEBUG_SYMBOLS=ON"
          if [ "${{ steps.changed.outputs.examples }}" = "true" ]; then
            CE="-DSINTRA_BUILD_EXAMPLES=ON"
          fi
          echo "CMAKE_FLAGS=$CT $CE $CS" >> "$GITHUB_OUTPUT"

      - name: Compute build parallelism
        shell: pwsh
        run: |
          $total = [int]($env:NUMBER_OF_PROCESSORS)
          if ($total -lt 1) { $total = 2 }
          $jobs = $total - 2
          if ($jobs -lt 2) { $jobs = 2 }
          if ($jobs -gt $total) { $jobs = $total }
          Add-Content -Path $env:GITHUB_ENV -Value "BUILD_JOBS=$jobs"
          Write-Host "Using $jobs build jobs (detected $total cores)."

      - name: Configure CMake
        run: cmake -G "Ninja Multi-Config" -B build -S . -DCMAKE_CXX_COMPILER=cl.exe -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_POLICY_DEFAULT_CMP0141=NEW -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded ${{ steps.flags.outputs.CMAKE_FLAGS }}

      - name: Build
        run: |
          cmake --build build --config Debug --parallel ${{ env.BUILD_JOBS }}
          cmake --build build --config Release --parallel ${{ env.BUILD_JOBS }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: windows-build-${{ github.event.pull_request.head.sha || github.sha }}
          path: build/
          retention-days: 1

      - name: Update build badge
        if: always() && github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@28b0fa8bdeb46170ac397105ece0c1fe58f68910 # v1.9.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 38c12e638eddbbfad6962730f6b10d20
          filename: sintra-windows-build.json
          label: Build
          message: ${{ job.status }}
          color: ${{ job.status == 'success' && 'green' || 'red' }}

  stress-tests:
    name: Windows Tests
    needs: build
    if: ${{ needs.build.result == 'success' }}
    uses: ./.github/workflows/stress-test-windows.yml
    secrets:
      repository-token: ${{ secrets.GITHUB_TOKEN }}
      gist-secret: ${{ secrets.GIST_SECRET }}
    with:
      build_run_id: ${{ github.run_id }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      branch: ${{ github.head_ref || github.ref_name }}
      pr_number: ${{ github.event.pull_request.number || '' }}
      base_sha: ${{ github.event.pull_request.base.sha || '' }}
      force_tests: ${{ github.event_name == 'workflow_dispatch' }}
